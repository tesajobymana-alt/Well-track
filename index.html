<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Well Track + GlowBot</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffe066,#ffd43b,#fff3bf,#fcc419);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:white;
overflow-x:hidden;
min-height:100vh;
transition:1s;
}

/* ANIMATED BACKGROUND */

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* GLOW DECOR */

.bg1,.bg2,.bg3{
position:fixed;
border-radius:50%;
filter:blur(80px);
z-index:-5;
opacity:0.5;
}

.bg1{
width:300px;
height:300px;
background:#fff3bf;
top:-100px;
left:-100px;
}

.bg2{
width:250px;
height:250px;
background:#ffd43b;
bottom:-80px;
right:-80px;
}

.bg3{
width:200px;
height:200px;
background:#ffe066;
top:40%;
left:60%;
}

/* STARS */

.stars{
position:fixed;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:0.2;
z-index:-4;
animation:starsMove 20s linear infinite;
}

@keyframes starsMove{
0%{transform:translateY(0px);}
100%{transform:translateY(-200px);}
}

/* FLOATING ICONS */

.floating{
position:fixed;
font-size:30px;
animation:floatAround 6s infinite ease-in-out;
z-index:-3;
opacity:0.7;
}

.floating1{
top:15%;
left:8%;
}

.floating2{
top:70%;
left:85%;
animation-delay:1s;
}

.floating3{
top:40%;
left:75%;
animation-delay:2s;
}

.floating4{
top:80%;
left:20%;
animation-delay:3s;
}

@keyframes floatAround{
0%{transform:translateY(0px);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0px);}
}

/* GLOW WAVE */

.wave{
position:fixed;
bottom:0;
width:100%;
height:120px;
background:rgba(255,255,255,0.15);
border-radius:50% 50% 0 0;
filter:blur(20px);
z-index:-2;
}

/* MOON */

.moon{
position:fixed;
top:40px;
right:40px;
width:90px;
height:90px;
background:rgba(255,255,255,0.4);
border-radius:50%;
box-shadow:0 0 40px white;
z-index:-2;
}

/* SCREEN */

.screen{
display:none;
padding:20px;
padding-bottom:100px;
}

.active{
display:block;
}

h1,h2{
text-align:center;
}

/* CARDS */

.card{
background:rgba(255,255,255,0.18);
backdrop-filter:blur(14px);
border-radius:24px;
padding:20px;
margin:15px 0;
border:1px solid rgba(255,255,255,0.25);
box-shadow:0 8px 32px rgba(0,0,0,0.15);
transition:0.3s;
position:relative;
overflow:hidden;
}

.card::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.2),
transparent
);
transition:0.7s;
}

.card:hover::before{
left:100%;
}

.card:hover{
transform:translateY(-5px);
}

/* BUTTONS */

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#f59f00,#fcc419);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 20px rgba(255,255,255,0.5);
}

.small{
width:30%;
display:inline-block;
}

/* INPUTS */

input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin-top:8px;
box-sizing:border-box;
}

/* NAV */

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:12px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
}

.nav button{
width:auto;
margin:0;
font-size:18px;
}

/* GLOWBOT */

.robotGlow{
width:170px;
height:170px;
margin:auto;
border-radius:40px;
display:flex;
align-items:center;
justify-content:center;
background:white;
box-shadow:0 0 60px white;
animation:float 3s infinite ease-in-out;
transition:0.5s;
font-size:85px;
position:relative;
overflow:hidden;
}

.robotGlow::after{
content:'';
position:absolute;
width:250px;
height:250px;
background:rgba(255,255,255,0.3);
border-radius:50%;
animation:pulse 3s infinite;
}

@keyframes pulse{
0%{transform:scale(0.8);opacity:0.5;}
100%{transform:scale(1.3);opacity:0;}
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

/* CHAT */

.chatBox{
height:220px;
overflow-y:auto;
background:rgba(255,255,255,0.2);
padding:10px;
border-radius:15px;
margin-top:10px;
}

.message{
padding:10px;
border-radius:12px;
margin-bottom:10px;
width:80%;
color:black;
}

.user{
background:#ffe066;
margin-left:auto;
}

.bot{
background:white;
}

/* BREATH */

.breathCircle{
width:120px;
height:120px;
border-radius:50%;
background:#ffd43b;
margin:20px auto;
animation:breathe 4s infinite;
box-shadow:0 0 40px yellow;
}

@keyframes breathe{
0%{transform:scale(0.8);}
50%{transform:scale(1.1);}
100%{transform:scale(0.8);}
}

/* PROGRESS */

.progress{
width:100%;
height:20px;
background:white;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#fcc419,#ffd43b);
transition:0.5s;
}

/* GARDEN */

.plant{
font-size:90px;
text-align:center;
animation:float 4s infinite;
}

.ecosystem{
font-size:75px;
text-align:center;
animation:float 5s infinite;
}

.crystal{
font-size:70px;
text-align:center;
animation:float 3s infinite;
}

.center{
text-align:center;
}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>

<div class="stars"></div>

<div class="floating floating1">✨</div>
<div class="floating floating2">🌟</div>
<div class="floating floating3">⭐</div>
<div class="floating floating4">💫</div>

<div class="moon"></div>

<div class="wave"></div>

<!-- HOME -->

<div id="home" class="screen active">

<h1>Well Track</h1>

<div class="card">

<h3>👤 Your Name</h3>

<input id="nameInput"
placeholder="Enter your name">

<button onclick="saveName()">
Save Name
</button>

<p id="username"></p>

</div>

<div class="card">

<h3>🔥 Streak:
<span id="streak">0</span></h3>

<h3>⭐ Points:
<span id="points">0</span></h3>

<h3>🏆 Badge:
<span id="badge">Beginner</span></h3>

</div>

<div class="card">

<h3>💡 Daily Tip</h3>

<p id="tip"></p>

</div>

<div class="card">

<h3>⚡ Body Energy Sync</h3>

<p id="energyText">
GlowBot energy is stable 🌿
</p>

<div class="progress">
<div id="energyBar"
class="bar"
style="width:70%;">
</div>
</div>

</div>

</div>

<!-- MENTAL -->

<div id="mental" class="screen">

<h2>🌟 GlowBot</h2>

<div class="card">

<div id="robotGlow"
class="robotGlow">
🌟
</div>

<p id="robotText"
class="center">
GlowBot is ready ✨
</p>

</div>

<div class="card">

<h3>Mood Check</h3>

<button class="small"
onclick="setMood('happy')">Happy</button>

<button class="small"
onclick="setMood('sad')">Sad</button>

<button class="small"
onclick="setMood('alright')">Alright</button>

<button class="small"
onclick="setMood('angry')">Angry</button>

<button class="small"
onclick="setMood('stressed')">Stressed</button>

<button class="small"
onclick="setMood('confused')">Confused</button>

<button class="small"
onclick="setMood('tired')">Tired</button>

<button class="small"
onclick="setMood('calm')">Calm</button>

<button class="small"
onclick="setMood('anxiety')">Anxiety</button>

<p id="moodText"></p>

</div>

<div class="card">

<h3>💎 Emotion Crystal</h3>

<div id="crystal"
class="crystal">
💎
</div>

</div>

<div class="card">

<h3>🌬 Breathing Exercise</h3>

<div class="breathCircle"></div>

<button onclick="breathing()">
Start
</button>

<p id="breath"></p>

</div>

<div class="card">

<h3>🤖 Glow AI Support</h3>

<div class="chatBox"
id="chatBox">

<div class="message bot">
Hi, I’m Glow AI 🌟
Tell me how you feel today.
</div>

</div>

<input id="chatInput"
placeholder="Talk to Glow AI...">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<!-- NAV -->

<div class="nav">

<button onclick="show('home')">
<i class="fa-solid fa-house"></i>
</button>

<button onclick="show('mental')">
<i class="fa-solid fa-brain"></i>
</button>

</div>

<script>

function show(screen){

document.querySelectorAll('.screen')
.forEach(x=>x.classList.remove('active'));

document.getElementById(screen)
.classList.add('active');

}

function saveName(){

let n=document.getElementById('nameInput').value;

document.getElementById('username')
.innerText='Hi '+n+' 👋';

}

function setMood(m){

let glow=document.getElementById('robotGlow');
let text=document.getElementById('robotText');
let crystal=document.getElementById('crystal');

if(m=='happy'){

document.body.style.background=
'linear-gradient(135deg,#fff3bf,#ffe066,#ffd43b)';

glow.style.background='#ffe066';
glow.style.boxShadow='0 0 60px yellow';

crystal.innerText='🌟';

text.innerText='Bright energy detected ✨';

}

if(m=='sad'){

document.body.style.background=
'linear-gradient(135deg,#74c0fc,#4dabf7,#a5d8ff)';

glow.style.background='#74c0fc';
glow.style.boxShadow='0 0 60px blue';

crystal.innerText='💙';

text.innerText='Take things slowly today 💙';

}

if(m=='anxiety'){

document.body.style.background=
'linear-gradient(135deg,#ffd8a8,#ffc078,#ffe8cc)';

glow.style.background='#ffc078';
glow.style.boxShadow='0 0 60px peachpuff';

crystal.innerText='🍑';

text.innerText='Take deep breaths slowly 🌬';

}

}

function breathing(){

document.getElementById('breath')
.innerText='Inhale... Hold... Exhale... 🌬';

}

function sendMessage(){

let input=
document.getElementById('chatInput');

let chat=
document.getElementById('chatBox');

let text=input.value;

if(text=="") return;

chat.innerHTML +=
'<div class="message user">'+
text+
'</div>';

chat.innerHTML +=
'<div class="message bot">I understand 🌿</div>';

input.value='';

chat.scrollTop=
chat.scrollHeight;

}

let tips=[

'Drink more water 💧',
'Take breaks while studying 📚',
'Sleep early tonight 😴',
'Talk to a friend 💬',
'Stretch your body 🏃',
'Write 3 good things daily ✨'

];

document.getElementById('tip').innerText=
tips[Math.floor(Math.random()*tips.length)];

</script>

</body>
  </html>
